name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # The release runs the identical gate as every PR. Nothing is published unless
  # the tagged commit is green.
  verify:
    name: Verify (green gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and verify
        run: ./gradlew build --stacktrace -Pversion=${GITHUB_REF_NAME#v}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

  release:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    environment: default
    timeout-minutes: 90
    env:
      JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
      JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
      JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
      JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # the annotated tag body is used as the release notes
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Build the artifacts that will be published, running the full gate again so
      # the published bits are exactly the bits that were verified.
      - name: Build release artifacts
        run: ./gradlew build -Pversion=${{ steps.get_version.outputs.VERSION }} --stacktrace

      - name: Publish to GitHub Packages
        run: ./gradlew publishMavenPublicationToGitHubPackagesRepository -Pversion=${{ steps.get_version.outputs.VERSION }}
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify JReleaser configuration
        run: ./gradlew jreleaserConfig -Pversion=${{ steps.get_version.outputs.VERSION }}

      - name: Publish GPG key to keyservers
        timeout-minutes: 5
        continue-on-error: true
        run: |
          echo "Publishing GPG key to keyservers with timeout..."
          echo "${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}" | gpg --import
          KEY_ID=$(gpg --list-keys --with-colons | grep pub | cut -d: -f5 | tail -1)
          echo "Using key ID: $KEY_ID"
          timeout 120s gpg --keyserver keyserver.ubuntu.com --send-keys $KEY_ID || echo "Ubuntu keyserver timeout/failed"
          timeout 120s gpg --keyserver keys.openpgp.org --send-keys $KEY_ID || echo "OpenPGP keyserver timeout/failed"
          timeout 120s gpg --keyserver pgp.mit.edu --send-keys $KEY_ID || echo "MIT keyserver timeout/failed"
          echo "GPG key publishing completed (some may have timed out)"

      # Sonatype can keep a deployment "transitioning" for longer than JReleaser is
      # willing to poll, which reports a failure even though the upload succeeded.
      # The authoritative answer is whether the artifact appears on Maven Central,
      # so this step may fail softly and the verification below decides.
      - name: Deploy to Maven Central with JReleaser
        id: jreleaser-deploy
        continue-on-error: true
        run: ./gradlew jreleaserDeploy --stacktrace -Pversion=${{ steps.get_version.outputs.VERSION }}

      - name: Verify publication on Maven Central
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          BASE="https://repo1.maven.org/maven2/de/deltatree/pub/apis/easyfin/${VERSION}"
          echo "Waiting for ${VERSION} to appear on Maven Central..."
          for i in $(seq 1 60); do
            missing=""
            for f in "easyfin-${VERSION}.pom" "easyfin-${VERSION}.jar" \
                     "easyfin-${VERSION}-sources.jar" "easyfin-${VERSION}-javadoc.jar" \
                     "easyfin-${VERSION}.jar.asc"; do
              code=$(curl -s -o /dev/null -w '%{http_code}' "${BASE}/${f}")
              [ "$code" = "200" ] || missing="${missing} ${f}(${code})"
            done
            if [ -z "$missing" ]; then
              echo "All artifacts are available on Maven Central."
              exit 0
            fi
            echo "[$i/60] still missing:${missing}"
            sleep 30
          done
          echo "::error::${VERSION} did not appear on Maven Central within 30 minutes"
          echo "JReleaser deploy outcome was: ${{ steps.jreleaser-deploy.outcome }}"
          exit 1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists."
          else
            git tag -l --format='%(contents)' "v${VERSION}" > /tmp/notes.md
            if [ -s /tmp/notes.md ]; then
              gh release create "v${VERSION}" --title "easyfin ${VERSION}" --notes-file /tmp/notes.md --verify-tag
            else
              gh release create "v${VERSION}" --title "easyfin ${VERSION}" --generate-notes --verify-tag
            fi
          fi

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-logs
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties
          if-no-files-found: ignore
